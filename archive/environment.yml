name: latentgee

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  - numpy=1.26
  - pandas
  - scipy=1.11
  - scikit-learn
  - statsmodels
  - matplotlib
  - numba=0.59
  - umap-learn
  - openpyxl
  - pyyaml

  - ipykernel
  - ipywidgets

  # PyTorch (CPU)
  - pytorch=2.2
  - cpuonly

  # GPU 사용 시:
  # - pytorch=2.2
  # - pytorch-cuda=11.8
  # - torchvision
  # - torchaudio

  - pip
  - pip:
      - optuna==3.6.1
      - scikit-bio
      # - hdbscan  ← 가능하면 conda로 이동